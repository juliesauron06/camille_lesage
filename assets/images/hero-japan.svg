<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration d'un Mont Fuji au crépuscule">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15100e"/>
      <stop offset="42%" stop-color="#2b1512"/>
      <stop offset="74%" stop-color="#50130f"/>
      <stop offset="100%" stop-color="#6b1414"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7e7d1" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#f0cda9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f0cda9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf8f4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#faf8f4" stop-opacity="0.14"/>
    </linearGradient>
  </defs>

  <!-- Ciel -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Soleil et halo -->
  <circle cx="1150" cy="285" r="260" fill="url(#sun)"/>
  <circle cx="1150" cy="285" r="108" fill="#f5dec2" fill-opacity="0.92"/>

  <!-- Brume d'horizon -->
  <rect y="520" width="1600" height="170" fill="url(#haze)"/>

  <!-- Mont Fuji -->
  <path d="M250 720 Q600 470 762 398 Q800 384 838 398 Q1000 470 1350 720 Z" fill="#241310" opacity="0.94"/>
  <!-- Neige du sommet -->
  <path d="M712 448 Q762 398 800 386 Q838 398 888 448 Q860 436 838 450 Q818 440 800 452 Q782 440 762 450 Q740 436 712 448 Z" fill="#f7f3ec" opacity="0.85"/>

  <!-- Collines au premier plan -->
  <path d="M0 744 Q360 678 760 730 Q1120 780 1600 720 L1600 900 L0 900 Z" fill="#170f0c"/>
  <path d="M0 814 Q460 754 940 806 Q1260 838 1600 798 L1600 900 L0 900 Z" fill="#0e0908"/>
</svg>
